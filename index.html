<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Racing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="startScreen">
        <h1>Car Racing Game</h1>
        <button id="startBtn">Start Game</button>
    </div>
    <div class="scoreBoard">
        Score: <span id="score">0</span>
    </div>
    <div class="gameArea">

        <div class="lane" style="left: 100px;"></div>
        <div class="lane" style="left: 200px;"></div>
        <div class="lane" style="left: 300px;"></div>
        <div class="lane" style="left: 400px;"></div>

        <div class="car"></div>
        <div class="gameOverScreen" id="gameOverScreen">
            <h2>Game Over</h2>
            <p>Your Score is: <span id="finalScore"></span></p>
            <button id="playAgainBtn">Play Again</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
